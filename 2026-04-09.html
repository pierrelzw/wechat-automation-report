.badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 12px; font-weight: 500; }

  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (i18n[key] && i18n[key][lang]) el.textContent = i18n[key][lang];
  });
  document.querySelectorAll('[data-i18n-tpl]').forEach(el => {
    const key = el.dataset.i18nTpl;
    if (i18n[key] && i18n[key][lang]) el.textContent = interpolate(i18n[key][lang], tplVars);
  });
}

function renderBatchTable() {
  const tbody = document.getElementById('batchTableBody');
  tbody.innerHTML = '';
  csvTable.forEach((r, i) => {
    const resolved = r.success + r.failed + r.suspect;
    const rateCell = resolved > 0
      ? `<span class="badge badge-success">${r.success_rate}%</span>`
      : `<span class="badge badge-cancel">—</span>`;
    const rowClass = (r.pending > 0 || r.canceled > 0) ? ' class="row-warn"' : '';
    tbody.innerHTML += `<tr${rowClass}>
      <td style="color:#86868b;font-variant-numeric:tabular-nums;">${i + 1}</td>
      <td class="csv-path">${r.relpath}</td>
      <td>${r.total}</td>
      <td>${r.success}</td>
      <td>${r.failed}</td>
      <td>${r.suspect}</td>
      <td>${r.canceled}</td>
      <td>${r.pending}</td>
      <td>${r.other}</td>
      <td>${rateCell}</td>
    </tr>`;
  });
}

function renderInviterTable() {
  const tbody = document.getElementById('inviterTableBody');
  if (!tbody) return;
  tbody.innerHTML = '';
  inviterTable.forEach(r => {
    tbody.innerHTML += `<tr>
      <td class="inviter-name">${r.inviter}</td>
      <td>${r.csv_count}</td>
      <td>${r.total}</td>
      <td>${r.success}</td>
      <td>${r.failed}</td>
      <td>${r.suspect}</td>
      <td><span class="badge badge-success">${r.success_rate}%</span></td>
    </tr>`;
  });
}

function setLang(lang) {
  currentLang = lang;
  applyLang(lang);
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', (b.textContent === '中' && lang === 'zh') || (b.textContent === 'EN' && lang === 'en'));
  });
}

applyLang('zh');
renderBatchTable();
renderInviterTable();
</script>

</body>
